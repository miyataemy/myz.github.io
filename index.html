    const { useState, useEffect, useRef } = React;

    const CanvasBackground = () => {
      const canvasRef = useRef(null);

      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        let animationId;
        let width, height;

        const resize = () => {
          width = canvas.width = window.innerWidth;
          height = canvas.height = window.innerHeight;
        };
        resize();
        window.addEventListener('resize', resize);

        const lines = Array.from({ length: 6 }, () => ({
          x: Math.random() * width,
          y: height + Math.random() * 300,
          speed: 0.2 + Math.random() * 0.4,
          amplitude: 15 + Math.random() * 25,
          frequency: 0.008 + Math.random() * 0.008,
          opacity: 0.06 + Math.random() * 0.12,
          phase: Math.random() * Math.PI * 2
        }));

        const nodes = Array.from({ length: 10 }, () => ({
          x: Math.random() * width,
          y: Math.random() * height,
          vx: (Math.random() - 0.5) * 0.25,
          vy: (Math.random() - 0.5) * 0.25,
          radius: 1.5 + Math.random() * 2.5,
          opacity: 0.08 + Math.random() * 0.15
        }));

        const metricTexts = ['+12.5%', 'KPI↑', 'ROI 24%', 'N=450', 'α=0.05', 'R²=0.92', 'p<0.01', 'YoY+10%'];
        const metrics = Array.from({ length: 8 }, (_, i) => ({
          x: Math.random() * width,
          y: height + Math.random() * 150,
          text: metricTexts[i],
          speed: 0.15 + Math.random() * 0.35,
          opacity: 0.06 + Math.random() * 0.1,
          size: 11 + Math.random() * 7
        }));

        const animate = () => {
          ctx.clearRect(0, 0, width, height);

          lines.forEach(line => {
            ctx.beginPath();
            ctx.strokeStyle = `rgba(154, 123, 61, ${line.opacity})`;
            ctx.lineWidth = 1.2;
            for (let y = 0; y < height; y += 4) {
              const x = line.x + Math.sin(y * line.frequency + line.phase) * line.amplitude * (1 - y / height);
              const drawY = height - y - (line.y * 0.3);
              if (y === 0) ctx.moveTo(x, drawY);
              else ctx.lineTo(x, drawY);
            }
            ctx.stroke();
            line.phase += 0.008;
            line.y -= line.speed;
            if (line.y < -height) {
              line.y = height + 100;
              line.x = Math.random() * width;
            }
          });

          ctx.strokeStyle = 'rgba(154, 123, 61, 0.05)';
          ctx.lineWidth = 0.8;
          for (let i = 0; i < nodes.length; i++) {
            for (let j = i + 1; j < nodes.length; j++) {
              const dx = nodes[i].x - nodes[j].x;
              const dy = nodes[i].y - nodes[j].y;
              const dist = Math.sqrt(dx * dx + dy * dy);
              if (dist < 180) {
                ctx.beginPath();
                ctx.moveTo(nodes[i].x, nodes[i].y);
                ctx.lineTo(nodes[j].x, nodes[j].y);
                ctx.stroke();
              }
            }
          }

          nodes.forEach(node => {
            ctx.beginPath();
            ctx.fillStyle = `rgba(154, 123, 61, ${node.opacity})`;
            ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
            ctx.fill();
            node.x += node.vx;
            node.y += node.vy;
            if (node.x < 0 || node.x > width) node.vx *= -1;
            if (node.y < 0 || node.y > height) node.vy *= -1;
          });

          metrics.forEach(metric => {
            ctx.font = `${metric.size}px 'JetBrains Mono', monospace`;
            ctx.fillStyle = `rgba(154, 123, 61, ${metric.opacity})`;
            ctx.fillText(metric.text, metric.x, metric.y);
            metric.y -= metric.speed;
            if (metric.y < -40) {
              metric.y = height + 60;
              metric.x = Math.random() * width;
            }
          });

          animationId = requestAnimationFrame(animate);
        };

        animate();
        return () => {
          cancelAnimationFrame(animationId);
          window.removeEventListener('resize', resize);
        };
      }, []);

      return <canvas ref={canvasRef} className="fixed inset-0 z-0 pointer-events-none" />;
    };

    const useScrollReveal = () => {
      const ref = useRef(null);
      useEffect(() => {
        const observer = new IntersectionObserver(
          ([entry]) => {
            if (entry.isIntersecting) {
              entry.target.classList.add('visible');
              observer.unobserve(entry.target);
            }
          },
          { threshold: 0.08, rootMargin: '0px 0px -60px 0px' }
        );
        if (ref.current) observer.observe(ref.current);
        return () => observer.disconnect();
      }, []);
      return ref;
    };

      useEffect(() => {

          const sections = ['hero', 'about', 'experience', 'certificates'];
          const scrollPos = window.scrollY + window.innerHeight / 3;
